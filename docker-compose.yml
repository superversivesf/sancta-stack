version: '3.8'

services:
  bede:
    build: ./services/bede
    container_name: sancta-bede
    ports:
      - "3000:3000"
    environment:
      - SERVICE_NAME=bede
      - SERVICE_PORT=3000
      - BEDE_DIOCESE=united-states
      - DEBUG=false
    volumes:
      - bede-data:/data
    networks:
      - sancta-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

