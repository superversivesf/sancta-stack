version: '3.8'

services:
  bede:
    build: ./services/bede
    container_name: sancta-bede
    ports:
      - "3000:3000"
    environment:
      - SERVICE_NAME=bede
      - SERVICE_PORT=3000
    networks:
      - sancta-network
    restart: unless-stopped

